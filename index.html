<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Ride</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2236;
  --bg-card-hover: #1f2a42;
  --accent-green: #00e701;
  --accent-green-dim: #00e70133;
  --accent-red: #ff3b5c;
  --accent-red-dim: #ff3b5c33;
  --accent-gold: #ffd700;
  --accent-gold-dim: #ffd70033;
  --accent-blue: #3b82f6;
  --accent-purple: #a855f7;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border-color: #1e293b;
  --border-active: #334155;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Manrope', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ═══════════ LAYOUT ═══════════ */
.game-container {
  display: grid;
  grid-template-columns: 1fr 320px;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  gap: 0;
}

/* ═══════════ TOP BAR ═══════════ */
.top-bar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  z-index: 10;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent-gold), #ff8c00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.logo span {
  font-weight: 400;
  font-size: 13px;
  background: linear-gradient(135deg, var(--text-secondary), var(--text-muted));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.balance-display {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-card);
  padding: 6px 16px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
}

.balance-display .currency {
  color: var(--accent-gold);
  font-size: 12px;
}

/* ═══════════ CANVAS AREA ═══════════ */
.canvas-area {
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse at 50% 120%, #0d1a2d 0%, var(--bg-primary) 70%);
}

canvas#gameCanvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ═══════════ MULTIPLIER OVERLAY ═══════════ */
.multiplier-overlay {
  position: absolute;
  top: 20px;
  right: 24px;
  text-align: right;
  pointer-events: none;
  z-index: 5;
}

.multiplier-overlay.centered {
  top: 50%;
  left: 50%;
  right: auto;
  transform: translate(-50%, -50%);
  text-align: center;
}

.multiplier-value {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 56px;
  line-height: 1;
  color: var(--text-primary);
  text-shadow: 0 0 40px rgba(0, 231, 1, 0.3);
  transition: color 0.15s, text-shadow 0.15s;
}

.multiplier-value.crashed {
  color: var(--accent-red);
  text-shadow: 0 0 60px rgba(255, 59, 92, 0.5);
}

.multiplier-value.cashed-out {
  color: var(--accent-green);
  text-shadow: 0 0 60px rgba(0, 231, 1, 0.5);
}

.multiplier-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ═══════════ WAITING STATE ═══════════ */
.waiting-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 3px;
}

.waiting-text .dot {
  animation: blink 1.4s infinite;
}
.waiting-text .dot:nth-child(2) { animation-delay: 0.2s; }
.waiting-text .dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 20% { opacity: 0; }
  50% { opacity: 1; }
  100% { opacity: 0; }
}

/* ═══════════ EVENT BANNER ═══════════ */
.event-banner {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 24px;
  border-radius: 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 6;
  white-space: nowrap;
}

.event-banner.visible {
  opacity: 1;
}

.event-banner.mini-boss {
  background: linear-gradient(135deg, #7c3aed33, #a855f733);
  border: 1px solid #a855f7;
  color: #c084fc;
}

.event-banner.debris {
  background: linear-gradient(135deg, #ea580c33, #f9731633);
  border: 1px solid #f97316;
  color: #fb923c;
}

.event-banner.boss-rage {
  background: linear-gradient(135deg, #dc262633, #ef444433);
  border: 1px solid #ef4444;
  color: #f87171;
}

.event-banner.golden-rocket {
  background: linear-gradient(135deg, #ca8a0433, #eab30833);
  border: 1px solid #eab308;
  color: #facc15;
}

/* ═══════════ HISTORY BAR ═══════════ */
.history-bar {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  max-width: 60%;
  z-index: 5;
}

.history-badge {
  padding: 3px 10px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  animation: badgeIn 0.3s ease-out;
}

@keyframes badgeIn {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.history-badge.green {
  background: var(--accent-green-dim);
  color: var(--accent-green);
  border: 1px solid #00e70155;
}

.history-badge.red {
  background: var(--accent-red-dim);
  color: var(--accent-red);
  border: 1px solid #ff3b5c55;
}

.history-badge.gold {
  background: var(--accent-gold-dim);
  color: var(--accent-gold);
  border: 1px solid #ffd70055;
}

/* ═══════════ SIDEBAR ═══════════ */
.sidebar {
  grid-row: 2 / 4;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
  overflow-y: auto;
}

.sidebar-section {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid var(--border-color);
}

.sidebar-section h3 {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ═══════════ BET MODE SELECTOR ═══════════ */
.mode-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 12px;
}

.mode-tab {
  padding: 8px 4px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.mode-tab:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-active);
}

.mode-tab.active {
  background: var(--accent-green-dim);
  border-color: var(--accent-green);
  color: var(--accent-green);
}

.mode-tab .cost {
  display: block;
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}

.mode-tab.active .cost {
  color: #00e70199;
}

/* ═══════════ BET AMOUNT ═══════════ */
.bet-input-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}

.bet-input {
  flex: 1;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  outline: none;
  transition: border-color 0.2s;
}

.bet-input:focus {
  border-color: var(--accent-green);
}

.bet-btn {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  background: var(--bg-primary);
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.bet-btn:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-active);
  color: var(--text-primary);
}

/* ═══════════ BET PRESETS ═══════════ */
.bet-presets {
  display: flex;
  gap: 4px;
  margin-top: 8px;
}

.bet-preset {
  flex: 1;
  padding: 6px 2px;
  border-radius: 6px;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.bet-preset:hover { background: var(--bg-card-hover); color: var(--text-secondary); }
.bet-preset.active { background: var(--accent-green-dim); border-color: var(--accent-green); color: var(--accent-green); }

/* ═══════════ PLAY / CASHOUT BUTTON ═══════════ */
.action-btn {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}

.action-btn.bet {
  background: linear-gradient(135deg, #00c853, #00e701);
  color: #0a0e17;
  box-shadow: 0 4px 24px #00e70144;
}

.action-btn.bet:hover {
  box-shadow: 0 4px 32px #00e70166;
  transform: translateY(-1px);
}

.action-btn.bet:active {
  transform: translateY(0);
}

.action-btn.cashout {
  background: linear-gradient(135deg, #f59e0b, #fbbf24);
  color: #0a0e17;
  box-shadow: 0 4px 24px #f59e0b44;
  animation: cashoutPulse 1s ease-in-out infinite;
}

@keyframes cashoutPulse {
  0%, 100% { box-shadow: 0 4px 24px #f59e0b44; }
  50% { box-shadow: 0 4px 36px #f59e0b77; }
}

.action-btn.cashout:hover {
  box-shadow: 0 4px 36px #f59e0b88;
}

.action-btn.disabled {
  background: var(--bg-card);
  color: var(--text-muted);
  cursor: not-allowed;
  box-shadow: none;
  animation: none;
}

.action-btn .sub-text {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  margin-top: 4px;
  letter-spacing: 0;
  opacity: 0.8;
}

/* ═══════════ AUTO CASHOUT ═══════════ */
.auto-cashout-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.auto-cashout-row label {
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
}

.auto-cashout-input {
  flex: 1;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
  width: 80px;
}

.auto-cashout-input:focus {
  border-color: var(--accent-gold);
}

/* ═══════════ AUTO BET ═══════════ */
.autobet-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}

.toggle-switch {
  position: relative;
  width: 44px;
  height: 24px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
}

.toggle-switch.active {
  background: var(--accent-green-dim);
  border-color: var(--accent-green);
}

.toggle-switch .toggle-knob {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 18px;
  height: 18px;
  background: var(--text-muted);
  border-radius: 50%;
  transition: all 0.3s;
}

.toggle-switch.active .toggle-knob {
  left: 22px;
  background: var(--accent-green);
}

.autobet-toggle span {
  font-size: 12px;
  color: var(--text-secondary);
}

/* ═══════════ STATS ═══════════ */
.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border-color);
}

.stat-row:last-child { border-bottom: none; }

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
}

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
}

/* ═══════════ BOTTOM BAR ═══════════ */
.bottom-bar {
  grid-column: 1;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 20px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  font-size: 11px;
  color: var(--text-muted);
}

.bottom-bar .tag {
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--bg-card);
  font-family: 'JetBrains Mono', monospace;
}

/* ═══════════ WIN POPUP ═══════════ */
.win-popup {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: linear-gradient(135deg, #1a2236ee, #111827ee);
  border: 2px solid var(--accent-green);
  border-radius: 20px;
  padding: 32px 48px;
  text-align: center;
  z-index: 20;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  backdrop-filter: blur(12px);
}

.win-popup.visible {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

.win-popup .win-amount {
  font-family: 'Orbitron', sans-serif;
  font-size: 48px;
  font-weight: 900;
  color: var(--accent-green);
  text-shadow: 0 0 40px #00e70155;
}

.win-popup .win-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 2px;
}

/* ═══════════ PARTICLES ═══════════ */
.particle {
  position: absolute;
  pointer-events: none;
  border-radius: 50%;
  z-index: 15;
}

/* ═══════════ SOUND TOGGLE ═══════════ */
.sound-toggle {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1;
}

.sound-toggle:hover { border-color: var(--border-active); }
.sound-toggle.muted { opacity: 0.4; }

/* ═══════════ MULTIPLIER COLORS ═══════════ */
.multiplier-value.tier-green { color: #00e701; text-shadow: 0 0 40px rgba(0,231,1,0.3); }
.multiplier-value.tier-yellow { color: #fbbf24; text-shadow: 0 0 40px rgba(251,191,36,0.3); }
.multiplier-value.tier-orange { color: #f97316; text-shadow: 0 0 40px rgba(249,115,22,0.3); }
.multiplier-value.tier-red { color: #ef4444; text-shadow: 0 0 40px rgba(239,68,68,0.4); }
.multiplier-value.tier-purple { color: #a855f7; text-shadow: 0 0 50px rgba(168,85,247,0.4); }

/* ═══════════ ROUND RESULT ═══════════ */
.round-result {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 28px;
  border-radius: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 6;
  white-space: nowrap;
  backdrop-filter: blur(8px);
}

.round-result.visible { opacity: 1; }

.round-result.win {
  background: linear-gradient(135deg, #00e70118, #00e70130);
  border: 1px solid #00e70155;
  color: var(--accent-green);
}

.round-result.loss {
  background: linear-gradient(135deg, #ff3b5c18, #ff3b5c30);
  border: 1px solid #ff3b5c55;
  color: var(--accent-red);
}

/* ═══════════ NEXT ROUND TIMER ═══════════ */
.next-round-timer {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 6;
}

.next-round-timer.visible { opacity: 1; }

/* ═══════════ RESPONSIVE ═══════════ */
@media (max-width: 900px) {
  .game-container {
    grid-template-columns: 1fr;
    grid-template-rows: auto 50vh auto auto;
  }
  .sidebar {
    grid-row: auto;
    border-left: none;
    border-top: 1px solid var(--border-color);
    flex-direction: row;
    flex-wrap: wrap;
    overflow-x: auto;
    padding: 12px;
  }
  .sidebar-section { min-width: 250px; flex: 1; }
  .multiplier-value { font-size: 48px; }
}
</style>
</head>
<body>

<div class="game-container">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">ROCKET <span>RIDE</span></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="sound-toggle" id="soundToggle" onclick="toggleSound()" title="Toggle sound">🔊</button>
      <div class="balance-display">
        <span class="currency">$</span>
        <span id="balanceValue">10,000.00</span>
      </div>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div class="canvas-area" id="canvasArea">
    <canvas id="gameCanvas"></canvas>

    <div class="history-bar" id="historyBar"></div>

    <div class="multiplier-overlay" id="multiplierOverlay">
      <div class="multiplier-value" id="multiplierValue">1.00×</div>
      <div class="multiplier-label" id="multiplierLabel">MULTIPLIER</div>
    </div>

    <div class="event-banner" id="eventBanner"></div>

    <div class="win-popup" id="winPopup">
      <div class="win-label">YOU WON</div>
      <div class="win-amount" id="winAmount">+$0.00</div>
    </div>

    <div class="round-result" id="roundResult"></div>
    <div class="next-round-timer" id="nextRoundTimer"></div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <!-- BET MODE -->
    <div class="sidebar-section">
      <h3>Bet Mode</h3>
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="base">Base<span class="cost">1× bet</span></button>
        <button class="mode-tab" data-mode="business_class">Business<span class="cost">10× bet</span></button>
        <button class="mode-tab" data-mode="vip_executive">VIP<span class="cost">25× bet</span></button>
        <button class="mode-tab" data-mode="ceo_mode">CEO<span class="cost">100× bet</span></button>
      </div>
    </div>

    <!-- BET AMOUNT -->
    <div class="sidebar-section">
      <h3>Bet Amount</h3>
      <div class="bet-input-row">
        <input type="number" class="bet-input" id="betInput" value="10" min="1" step="1">
        <button class="bet-btn" onclick="setBetMax()">MAX</button>
      </div>
      <div class="bet-input-row" style="margin-top:6px;">
        <button class="bet-btn" onclick="setBetPreset(1)">$1</button>
        <button class="bet-btn" onclick="setBetPreset(5)">$5</button>
        <button class="bet-btn" onclick="setBetPreset(10)">$10</button>
        <button class="bet-btn" onclick="setBetPreset(50)">$50</button>
        <button class="bet-btn" onclick="setBetPreset(100)">$100</button>
      </div>
      <div class="bet-presets" id="betPresets">
        <button class="bet-preset" onclick="setBetAmount(1)">$1</button>
        <button class="bet-preset" onclick="setBetAmount(5)">$5</button>
        <button class="bet-preset active" onclick="setBetAmount(10)">$10</button>
        <button class="bet-preset" onclick="setBetAmount(50)">$50</button>
        <button class="bet-preset" onclick="setBetAmount(100)">$100</button>
      </div>

      <div class="auto-cashout-row">
        <label>Auto cashout:</label>
        <input type="number" class="auto-cashout-input" id="autoCashout" value="" placeholder="OFF" min="1.01" step="0.01">
        <span style="font-size:11px; color: var(--text-muted)">×</span>
      </div>

      <div class="autobet-toggle">

<script>
// ═══════════════════════════════════════════════
//  ROCKET RIDE — COMPLETE MATH + FRONTEND
// ═══════════════════════════════════════════════

// ──────────── GAME CONFIG ────────────
const CONFIG = {
  HOUSE_EDGE: 0.04,
  RTP: 0.96,
  MIN_CRASH_POINT: 1.20,
  GROWTH_RATE: 0.06,
  TICK_MS: 50,
  
  MODES: {
    base:           { multiplier: 1,   winCap: 5000,   label: 'Base (1×)' },
    business_class: { multiplier: 10,  winCap: 50000,  label: 'Business (10×)' },
    vip_executive:  { multiplier: 25,  winCap: 125000, label: 'VIP (25×)' },
    ceo_mode:       { multiplier: 100, winCap: 500000, label: 'CEO (100×)' },
  },

  // Event weights (sum ≈ probability distribution)
  EVENTS: {
    base_crash:    { weight: 0.5204, rtpShare: 0.52 },
    mini_boss:     { weight: 0.1174, rtpShare: 0.117, triggerRange: [2.0, 8.0], bonusMult: [1.2, 2.5] },
    debris:        { weight: 0.0800, rtpShare: 0.08,  triggerRange: [1.5, 4.0], penalty: [0.5, 0.8] },
    boss_rage:     { weight: 0.0793, rtpShare: 0.079, triggerRange: [3.0, 12.0], bonusMult: [1.5, 5.0] },
    golden_rocket: { weight: 0.1600, rtpShare: 0.16,  triggerRange: [1.5, 6.0], bonusMult: [2.0, 10.0] },
  },

  COUNTDOWN_SEC: 3,
};

// ──────────── MATH ENGINE ────────────
class MathEngine {
  // Generate crash point with house edge (provably fair style)
  static generateCrashPoint() {
    const r = Math.random();
    // Exponential distribution: E[1/crash] = house_edge → ~96% RTP
    const raw = Math.max(1.00, Math.floor(CONFIG.RTP / r * 100) / 100);
    // Enforce minimum flight time — no instant crashes
    return Math.max(raw, CONFIG.MIN_CRASH_POINT);
  }

  // Select event type based on weights
  static selectEventType() {
    const r = Math.random();
    let cumulative = 0;
    for (const [type, cfg] of Object.entries(CONFIG.EVENTS)) {
      cumulative += cfg.weight;
      if (r <= cumulative) return type;
    }
    return 'base_crash';
  }

  // Generate full round events
  static generateRound() {
    const crashPoint = this.generateCrashPoint();
    const eventType = this.selectEventType();
    const events = [];
    
    // Base flight events
    events.push({ type: 'flight_start', tick: 0 });

    // Add mechanic-specific events
    if (eventType === 'mini_boss' && crashPoint >= 2.0) {
      const trigger = this.randomInRange(
        Math.min(2.0, crashPoint * 0.3),
        Math.min(crashPoint * 0.6, 8.0)
      );
      const bonus = this.randomInRange(1.2, Math.min(2.5, crashPoint / trigger));
      events.push({
        type: 'mini_boss',
        triggerAt: Math.round(trigger * 100) / 100,
        bonusMult: Math.round(bonus * 100) / 100,
        tick: this.multiplierToTick(trigger),
      });
    }

    if (eventType === 'debris' && crashPoint >= 1.5) {
      const trigger = this.randomInRange(1.3, Math.min(crashPoint * 0.7, 4.0));
      events.push({
        type: 'debris',
        triggerAt: Math.round(trigger * 100) / 100,
        penalty: Math.round(this.randomInRange(0.5, 0.8) * 100) / 100,
        tick: this.multiplierToTick(trigger),
      });
    }

    if (eventType === 'boss_rage' && crashPoint >= 3.0) {
      const trigger = this.randomInRange(2.0, Math.min(crashPoint * 0.5, 10.0));
      const bonus = this.randomInRange(1.5, Math.min(5.0, crashPoint / trigger));
      events.push({
        type: 'boss_rage',
        triggerAt: Math.round(trigger * 100) / 100,
        bonusMult: Math.round(bonus * 100) / 100,
        tick: this.multiplierToTick(trigger),
      });
    }

    if (eventType === 'golden_rocket' && crashPoint >= 1.5) {
      const trigger = this.randomInRange(1.2, Math.min(crashPoint * 0.4, 5.0));
      const bonus = this.randomInRange(2.0, Math.min(10.0, crashPoint / trigger));
      events.push({
        type: 'golden_rocket',
        triggerAt: Math.round(trigger * 100) / 100,
        bonusMult: Math.round(bonus * 100) / 100,
        tick: this.multiplierToTick(trigger),
      });
    }

    // Sort events by tick
    events.sort((a, b) => a.tick - b.tick);

    // Crash event
    const crashTick = this.multiplierToTick(crashPoint);
    events.push({ type: 'crash', tick: crashTick, crashPoint });

    return { crashPoint, eventType, events, crashTick };
  }

  static multiplierToTick(mult) {
    // mult = e^(GROWTH_RATE * tick * TICK_MS/1000)
    // tick = ln(mult) / (GROWTH_RATE * TICK_MS/1000)
    if (mult <= 1) return 0;
    return Math.round(Math.log(mult) / (CONFIG.GROWTH_RATE * CONFIG.TICK_MS / 1000));
  }

  static tickToMultiplier(tick) {
    return Math.exp(CONFIG.GROWTH_RATE * tick * CONFIG.TICK_MS / 1000);
  }

  static randomInRange(min, max) {
    return min + Math.random() * (max - min);
  }
}

// ──────────── SOUND ENGINE (Web Audio Synthesis) ────────────
class SoundEngine {
  constructor() {
    this.ctx = null;
    this.enabled = true;
  }

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }

  play(name, opts = {}) {
    if (!this.enabled || !this.ctx) return;
    try {
      const now = this.ctx.currentTime;
      switch (name) {
        case 'bet': this._tone(440, 0.08, 'sine', 0.2); break;
        case 'launch': this._sweep(200, 800, 0.4, 'sawtooth', 0.15); break;
        case 'tick': {
          const m = window._currentMult || 1;
          const basePitch = 400 + Math.min(m * 80, 800);
          this._tone(basePitch + Math.random() * 100, 0.02, 'sine', Math.min(0.04 + m * 0.005, 0.1));
          break;
        }
        case 'cashout': this._chord([523, 659, 784], 0.3, 0.2); break;
        case 'crash': this._noise(0.5, 0.3); break;
        case 'miniboss': this._sweep(300, 150, 0.3, 'square', 0.1); break;
        case 'golden': this._chord([784, 988, 1175], 0.4, 0.15); break;
        case 'debris': this._noise(0.2, 0.1); break;
        case 'win': this._chord([523, 659, 784, 1047], 0.6, 0.2); break;
      }
    } catch(e) {}
  }

  _tone(freq, dur, type, vol) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + dur);
  }

  _sweep(f1, f2, dur, type, vol) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f1, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(f2, this.ctx.currentTime + dur);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + dur);
  }

  _chord(freqs, dur, vol) {
    freqs.forEach(f => this._tone(f, dur, 'sine', vol / freqs.length));
  }

  _noise(dur, vol) {
    const bufferSize = this.ctx.sampleRate * dur;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource();
    const gain = this.ctx.createGain();
    src.buffer = buffer;
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    src.connect(gain).connect(this.ctx.destination);
    src.start();
  }
}

// ──────────── CANVAS RENDERER ────────────
class GameRenderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.stars = [];
    this.particles = [];
    this.graphPoints = [];
    this.eventMarkers = [];
    this.rocketX = 0;
    this.rocketY = 0;
    this.rocketAngle = 0;
    this.shakeX = 0;
    this.shakeY = 0;
    this.isGolden = false;
    this.obstacles = [];
    this.collectibles = [];
    this.resize();
    this._initStars();
    window.addEventListener('resize', () => this.resize());
  }

  resize() {
    const area = document.getElementById('canvasArea');
    const dpr = window.devicePixelRatio || 1;
    this.canvas.width = area.clientWidth * dpr;
    this.canvas.height = area.clientHeight * dpr;
    this.ctx.scale(dpr, dpr);
    this.w = area.clientWidth;
    this.h = area.clientHeight;
  }

  _initStars() {
    this.stars = [];
    for (let i = 0; i < 120; i++) {
      this.stars.push({
        x: Math.random() * 2000,
        y: Math.random() * 2000,
        r: Math.random() * 1.5 + 0.3,
        a: Math.random() * 0.6 + 0.2,
        speed: Math.random() * 0.5 + 0.1,
      });
    }
  }

  render(state) {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.w, this.h);
    ctx.save();

    // Apply shake
    if (this.shakeX || this.shakeY) {
      ctx.translate(this.shakeX, this.shakeY);
    }

    // Background gradient — shifts color with multiplier
    const mult = window._currentMult || 1;
    let bgInner = '#0d1f3c';
    let bgMid = '#0a0e17';
    if (state === 'flying' && mult > 3) {
      const t = Math.min((mult - 3) / 20, 1);
      // Shift from blue-dark → purple → red-dark
      const r1 = Math.round(13 + t * 30);
      const g1 = Math.round(31 - t * 15);
      const b1 = Math.round(60 + t * 30);
      bgInner = `rgb(${r1},${g1},${b1})`;
      const r2 = Math.round(10 + t * 20);
      const g2 = Math.round(14 - t * 8);
      const b2 = Math.round(23 + t * 15);
      bgMid = `rgb(${r2},${g2},${b2})`;
    }
    const bgGrad = ctx.createRadialGradient(this.w/2, this.h*1.2, 0, this.w/2, this.h*1.2, this.h);
    bgGrad.addColorStop(0, bgInner);
    bgGrad.addColorStop(0.5, bgMid);
    bgGrad.addColorStop(1, '#050810');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, this.w, this.h);

    // Stars
    this._renderStars(ctx, state);

    // Multiplier graph curve
    if (state === 'flying' || state === 'crashed' || state === 'cashed_out') {
      this._renderGraph(ctx, state);
    }

    if (state === 'flying' || state === 'crashed' || state === 'cashed_out') {
      this._renderObstacles(ctx);
      this._renderCollectibles(ctx);
      this._renderRocket(ctx);
    }

    // Particles
    this._renderParticles(ctx);

    // #8: HypeGames watermark
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.font = 'bold 11px Orbitron';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText('HypeGames', this.w - 12, this.h - 8);
    ctx.restore();

    ctx.restore();
  }

  _renderStars(ctx, state) {
    const mult = state === 'flying' ? (window._currentMult || 1) : 1;
    const isFlying = state === 'flying';
    
    // Speed: rocket flies right+up → stars fly LEFT + slightly DOWN
    const speedX = isFlying ? -(2 + Math.min(mult * 1.2, 14)) : 0;
    const speedY = isFlying ? (0.8 + Math.min(mult * 0.3, 4)) : 0.2;
    
    // Streak angle: diagonal, matching rocket's perceived direction
    const streakAngle = Math.atan2(-speedY, -speedX); // opposite of motion

    this.stars.forEach(s => {
      s.x += s.speed * speedX;
      s.y += s.speed * speedY;
      
      // Wrap around
      if (s.x < -10) { s.x = this.w + 5; s.y = Math.random() * this.h; }
      if (s.y > this.h + 10) { s.y = -5; s.x = Math.random() * this.w; }
      if (s.x > this.w + 10) { s.x = -5; }

      const sx = s.x;
      const sy = s.y;

      if (isFlying && mult > 1.2) {
        // Diagonal streaks — direction matches camera motion
        const streakLen = Math.min(s.speed * (2 + mult) * 1.5, 35);
        const dx = Math.cos(streakAngle) * streakLen;
        const dy = Math.sin(streakAngle) * streakLen;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + dx, sy + dy);
        ctx.strokeStyle = `rgba(255,255,255,${s.a * 0.6})`;
        ctx.lineWidth = s.r * 0.7;
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
      }
    });

    // Speed lines at high multiplier — diagonal matching flight direction
    if (isFlying && mult > 3) {
      const lineCount = Math.min(Math.floor((mult - 3) * 2.5), 18);
      ctx.globalAlpha = Math.min((mult - 3) / 8, 0.25);
      for (let i = 0; i < lineCount; i++) {
        const seed = i * 7.31 + 0.5;
        const lx = ((Math.sin(seed + Date.now() * 0.0005) * 0.5 + 0.5) * this.w * 1.3) - this.w * 0.15;
        const ly = ((Math.cos(seed * 1.7 + Date.now() * 0.0003) * 0.5 + 0.5) * this.h * 1.3) - this.h * 0.15;
        const len = 50 + mult * 4;
        const dx = Math.cos(streakAngle) * len;
        const dy = Math.sin(streakAngle) * len;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(lx + dx, ly + dy);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
  }

  _renderGraph(ctx, state) {
    if (this.graphPoints.length < 2) return;

    const padding = { left: 60, bottom: 50, top: 30, right: 30 };
    const gw = this.w - padding.left - padding.right;
    const gh = this.h - padding.top - padding.bottom;

    // Sliding window: show last N ticks, rocket stays at ~80% of X
    const visibleTicks = 200; // ~10 seconds visible
    const totalPts = this.graphPoints.length;
    const scrollOffset = Math.max(0, totalPts - Math.floor(visibleTicks * 0.8));
    const visibleStart = Math.max(0, scrollOffset);
    const visibleEnd = totalPts;
    const xRange = Math.max(visibleTicks, visibleEnd - visibleStart);

    const maxMult = Math.max(2.0, ...this.graphPoints.map(p => p.mult)) * 1.15;

    const toX = (i) => padding.left + ((i - visibleStart) / xRange) * gw;
    const toY = (m) => this.h - padding.bottom - ((m - 1) / (maxMult - 1)) * gh;

    // Grid lines
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);

    // Horizontal grid + labels
    const multSteps = [1, 1.5, 2, 3, 5, 10, 20, 50, 100].filter(m => m <= maxMult);
    multSteps.forEach(m => {
      const y = toY(m);
      if (y < padding.top || y > this.h - padding.bottom) return;
      ctx.beginPath();
      ctx.moveTo(padding.left, y);
      ctx.lineTo(this.w - padding.right, y);
      ctx.stroke();
    });
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    // Axis labels
    ctx.font = '11px JetBrains Mono';
    ctx.fillStyle = '#64748b';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    multSteps.forEach(m => {
      const y = toY(m);
      if (y < padding.top || y > this.h - padding.bottom) return;
      ctx.fillText(m.toFixed(m >= 10 ? 0 : 1) + '×', padding.left - 8, y);
    });

    // Draw the curve - gradient colored by multiplier
    const lastPt = this.graphPoints[this.graphPoints.length - 1];
    const curveColor = state === 'crashed' ? '#ff3b5c' :
      lastPt.mult < 2 ? '#00e701' :
      lastPt.mult < 5 ? '#fbbf24' :
      lastPt.mult < 10 ? '#f97316' :
      lastPt.mult < 25 ? '#ef4444' : '#a855f7';

    // Clip to graph area
    ctx.save();
    ctx.beginPath();
    ctx.rect(padding.left - 2, padding.top, gw + 4, gh + 2);
    ctx.clip();

    // Glow
    ctx.shadowColor = curveColor;
    ctx.shadowBlur = 12;

    // Draw from first point (may be off-screen left for smooth entry)
    const drawStart = Math.max(0, visibleStart - 1);

    // Filled area under curve
    ctx.beginPath();
    ctx.moveTo(toX(drawStart), toY(1));
    for (let i = drawStart; i < visibleEnd; i++) {
      ctx.lineTo(toX(i), toY(this.graphPoints[i].mult));
    }
    ctx.lineTo(toX(visibleEnd - 1), toY(1));
    ctx.closePath();
    const fillGrad = ctx.createLinearGradient(0, toY(maxMult), 0, toY(1));
    fillGrad.addColorStop(0, curveColor + '26');
    fillGrad.addColorStop(1, curveColor + '00');
    ctx.fillStyle = fillGrad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(toX(drawStart), toY(this.graphPoints[drawStart].mult));
    for (let i = drawStart + 1; i < visibleEnd; i++) {
      ctx.lineTo(toX(i), toY(this.graphPoints[i].mult));
    }
    ctx.strokeStyle = curveColor;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.restore(); // restore clip

    // #3: Auto-cashout target line
    if (State.autoCashout && State.autoCashout <= maxMult && state === 'flying') {
      const acy = toY(State.autoCashout);
      if (acy > padding.top && acy < this.h - padding.bottom) {
        ctx.save();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = '#fbbf2488';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding.left, acy);
        ctx.lineTo(this.w - padding.right, acy);
        ctx.stroke();
        ctx.setLineDash([]);
        // Label
        ctx.font = 'bold 10px JetBrains Mono';
        ctx.fillStyle = '#fbbf24';
        ctx.textAlign = 'right';
        ctx.fillText('TARGET ' + State.autoCashout.toFixed(2) + '×', this.w - padding.right - 4, acy - 5);
        ctx.restore();
      }
    }

    // #4: Event markers on the curve
    const markerColors = { mini_boss: '#a855f7', debris: '#f97316', boss_rage: '#ef4444', golden_rocket: '#fbbf24' };
    this.eventMarkers.forEach(m => {
      if (m.tick < visibleStart || m.tick >= visibleEnd) return;
      const mx = toX(m.tick);
      const my = toY(this.graphPoints[m.tick] ? this.graphPoints[m.tick].mult : 1);
      const color = markerColors[m.type] || '#ffffff';
      // Dot
      ctx.beginPath();
      ctx.arc(mx, my, 6, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = '#0a0e17';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Emoji label above
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(m.label, mx, my - 12);
    });

    // #2: Current bet info during flight
    if (state === 'flying') {
      ctx.font = '11px JetBrains Mono';
      ctx.fillStyle = '#94a3b8';
      ctx.textAlign = 'left';
      const modeCfg = CONFIG.MODES[State.mode];
      ctx.fillText(`$${(State.betAmount * modeCfg.multiplier).toFixed(0)} on ${modeCfg.label}`, padding.left + 4, this.h - padding.bottom + 20);
    }

    // Position rocket at curve endpoint
    const endIdx = this.graphPoints.length - 1;
    const ex = toX(endIdx);
    const ey = toY(lastPt.mult);
    this.rocketX = ex;
    this.rocketY = ey;
    
    // Angle: always calculate with adaptive lookback, smooth from start
    const lookback = Math.min(endIdx, 12);
    if (lookback >= 1) {
      const prevIdx = endIdx - lookback;
      const dx = toX(endIdx) - toX(prevIdx);
      const dy = toY(this.graphPoints[endIdx].mult) - toY(this.graphPoints[prevIdx].mult);
      const targetAngle = Math.atan2(dy, dx) + Math.PI / 2;
      // Smooth interpolation to prevent jitter
      if (this._prevAngle === undefined) this._prevAngle = targetAngle;
      this.rocketAngle = this._prevAngle + (targetAngle - this._prevAngle) * 0.15;
      this._prevAngle = this.rocketAngle;
    } else {
      // Very first frame: rocket points right (along x-axis)
      this.rocketAngle = Math.PI / 2;
      this._prevAngle = this.rocketAngle;
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  _renderRocket(ctx) {
    const x = this.rocketX;
    const y = this.rocketY;
    const size = 22;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(this.rocketAngle);

    // Engine glow
    const glowGrad = ctx.createRadialGradient(0, size, 0, 0, size, size * 2);
    glowGrad.addColorStop(0, this.isGolden ? 'rgba(255,215,0,0.6)' : 'rgba(0,231,1,0.5)');
    glowGrad.addColorStop(0.5, this.isGolden ? 'rgba(255,165,0,0.2)' : 'rgba(0,231,1,0.15)');
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(-size*2, 0, size*4, size*3);

    // Rocket body
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.quadraticCurveTo(size * 0.7, -size * 0.3, size * 0.5, size * 0.5);
    ctx.lineTo(size * 0.7, size);
    ctx.lineTo(-size * 0.7, size);
    ctx.lineTo(-size * 0.5, size * 0.5);
    ctx.quadraticCurveTo(-size * 0.7, -size * 0.3, 0, -size);
    ctx.closePath();

    const bodyGrad = ctx.createLinearGradient(-size * 0.5, 0, size * 0.5, 0);
    if (this.isGolden) {
      bodyGrad.addColorStop(0, '#b8860b');
      bodyGrad.addColorStop(0.3, '#ffd700');
      bodyGrad.addColorStop(0.7, '#ffec8b');
      bodyGrad.addColorStop(1, '#b8860b');
    } else {
      bodyGrad.addColorStop(0, '#1a365d');
      bodyGrad.addColorStop(0.3, '#2563eb');
      bodyGrad.addColorStop(0.7, '#60a5fa');
      bodyGrad.addColorStop(1, '#1a365d');
    }
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Nose cone
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.quadraticCurveTo(size * 0.3, -size * 0.5, size * 0.2, -size * 0.2);
    ctx.lineTo(-size * 0.2, -size * 0.2);
    ctx.quadraticCurveTo(-size * 0.3, -size * 0.5, 0, -size);
    ctx.fillStyle = this.isGolden ? '#fff8dc' : '#ef4444';
    ctx.fill();

    // Window
    ctx.beginPath();
    ctx.arc(0, -size * 0.05, size * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = '#e0f2fe';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(-size * 0.04, -size * 0.1, size * 0.08, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();

    // Fins
    ctx.fillStyle = this.isGolden ? '#daa520' : '#dc2626';
    // Left fin
    ctx.beginPath();
    ctx.moveTo(-size * 0.5, size * 0.3);
    ctx.lineTo(-size * 0.9, size * 1.1);
    ctx.lineTo(-size * 0.35, size * 0.8);
    ctx.closePath();
    ctx.fill();
    // Right fin
    ctx.beginPath();
    ctx.moveTo(size * 0.5, size * 0.3);
    ctx.lineTo(size * 0.9, size * 1.1);
    ctx.lineTo(size * 0.35, size * 0.8);
    ctx.closePath();
    ctx.fill();

    // Engine flame
    const flameLen = size * (1 + Math.random() * 0.8);
    const flameGrad = ctx.createLinearGradient(0, size, 0, size + flameLen);
    flameGrad.addColorStop(0, this.isGolden ? '#ffd700' : '#fbbf24');
    flameGrad.addColorStop(0.3, '#f97316');
    flameGrad.addColorStop(0.7, '#ef4444');
    flameGrad.addColorStop(1, 'rgba(239,68,68,0)');
    ctx.beginPath();
    ctx.moveTo(-size * 0.3, size);
    ctx.quadraticCurveTo(0, size + flameLen * 0.8, size * 0.05, size + flameLen);
    ctx.quadraticCurveTo(0, size + flameLen * 0.8, size * 0.3, size);
    ctx.fillStyle = flameGrad;
    ctx.fill();

    ctx.restore();
  }

  _renderObstacles(ctx) {
    this.obstacles.forEach(o => {
      if (o.alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = o.alpha;
      ctx.translate(o.x, o.y);
      
      if (o.type === 'debris') {
        // Asteroid-like debris
        ctx.fillStyle = '#78716c';
        ctx.beginPath();
        const pts = o.points || 6;
        for (let i = 0; i < pts; i++) {
          const ang = (i / pts) * Math.PI * 2;
          const r = o.size * (0.7 + Math.sin(i * 2.3) * 0.3);
          if (i === 0) ctx.moveTo(Math.cos(ang) * r, Math.sin(ang) * r);
          else ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#a8a29e';
        ctx.lineWidth = 1;
        ctx.stroke();
      } else if (o.type === 'boss') {
        // Boss icon (skull-like)
        ctx.fillStyle = o.isRage ? '#ef4444' : '#a855f7';
        ctx.beginPath();
        ctx.arc(0, 0, o.size, 0, Math.PI * 2);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-o.size * 0.3, -o.size * 0.15, o.size * 0.2, 0, Math.PI * 2);
        ctx.arc(o.size * 0.3, -o.size * 0.15, o.size * 0.2, 0, Math.PI * 2);
        ctx.fill();
        // Mouth
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, o.size * 0.2, o.size * 0.3, 0, Math.PI);
        ctx.stroke();
      }
      ctx.restore();
    });
  }

  _renderCollectibles(ctx) {
    this.collectibles.forEach(c => {
      if (c.alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = c.alpha;
      ctx.translate(c.x, c.y);

      // Golden coin
      const t = Date.now() / 500;
      const scaleX = Math.abs(Math.cos(t + c.phase));
      ctx.scale(scaleX || 0.1, 1);

      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(0, 0, c.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#b8860b';
      ctx.lineWidth = 2;
      ctx.stroke();
      // $ symbol
      ctx.fillStyle = '#b8860b';
      ctx.font = `bold ${c.size}px Orbitron`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, 1);
      
      ctx.restore();
    });
  }

  _renderParticles(ctx) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      p.vy += 0.1; // gravity

      if (p.life <= 0) {
        this.particles.splice(i, 1);
        continue;
      }

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace('1)', `${p.life})`);
      ctx.fill();
    }
  }

  addExplosion(x, y, color, count = 30) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 5 + 2;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: Math.random() * 4 + 1,
        life: 1,
        decay: Math.random() * 0.02 + 0.01,
        color: color,
      });
    }
  }

  addTrailParticle(x, y) {
    const mult = window._currentMult || 1;
    const speed = 1.5 + Math.min(mult * 0.4, 4);
    const size = 22;
    const angle = this.rocketAngle || 0;
    
    // Tail position in world coords: local (0, +size) rotated by angle
    const tailX = x - Math.sin(angle) * size * 1.3;
    const tailY = y + Math.cos(angle) * size * 1.3;
    
    // Exhaust direction: opposite of nose, with spread
    const spread = (Math.random() - 0.5) * 0.5;
    const exAngle = angle + Math.PI + spread; // opposite of nose direction in local-to-world
    const vx = Math.sin(exAngle) * speed * (0.5 + Math.random());
    const vy = -Math.cos(exAngle) * speed * (0.5 + Math.random());
    
    this.particles.push({
      x: tailX + (Math.random() - 0.5) * 4,
      y: tailY + (Math.random() - 0.5) * 4,
      vx, vy,
      r: Math.random() * 3 + 1.5,
      life: 1,
      decay: 0.025 + Math.random() * 0.015,
      color: this.isGolden ? 'rgba(255,215,0,1)' : 'rgba(255,165,0,1)',
    });
  }

  shake(intensity = 5) {
    const dur = 300;
    const start = Date.now();
    const doShake = () => {
      const elapsed = Date.now() - start;
      if (elapsed > dur) {
        this.shakeX = 0;
        this.shakeY = 0;
        return;
      }
      const factor = 1 - elapsed / dur;
      this.shakeX = (Math.random() - 0.5) * intensity * factor;
      this.shakeY = (Math.random() - 0.5) * intensity * factor;
      requestAnimationFrame(doShake);
    };
    doShake();
  }
}

// ──────────── GAME STATE ────────────
const State = {
  balance: 10000,
  betAmount: 10,
  mode: 'base',
  phase: 'idle', // idle, countdown, flying, crashed, cashed_out
  
  // Round data
  currentRound: null,
  currentTick: 0,
  currentMultiplier: 1.00,
  cashedOutAt: null,
  
  // Events
  triggeredEvents: new Set(),
  activeEvent: null,
  bonusWinnings: 0,
  debrisPenalty: 1.0,
  
  // Auto
  autoBet: false,
  turbo: false,
  autoCashout: null,
  
  // History
  history: [],
  
  // Stats
  sessionPL: 0,
  roundsPlayed: 0,
  
  // Timer refs
  tickInterval: null,
  countdownTimer: null,
};

// ──────────── DOM REFS ────────────
const DOM = {
  balance: document.getElementById('balanceValue'),
  multiplier: document.getElementById('multiplierValue'),
  multiplierLabel: document.getElementById('multiplierLabel'),
  multiplierOverlay: document.getElementById('multiplierOverlay'),
  actionBtn: document.getElementById('actionBtn'),
  actionSub: document.getElementById('actionSub'),
  betInput: document.getElementById('betInput'),
  autoCashout: document.getElementById('autoCashout'),
  eventBanner: document.getElementById('eventBanner'),
  historyBar: document.getElementById('historyBar'),
  winPopup: document.getElementById('winPopup'),
  winAmount: document.getElementById('winAmount'),
  statMode: document.getElementById('statMode'),
  statCost: document.getElementById('statCost'),
  statWinCap: document.getElementById('statWinCap'),
  statEvents: document.getElementById('statEvents'),
  statPL: document.getElementById('statPL'),
  statRounds: document.getElementById('statRounds'),
  canvas: document.getElementById('gameCanvas'),
  roundResult: document.getElementById('roundResult'),
  nextRoundTimer: document.getElementById('nextRoundTimer'),
  soundToggle: document.getElementById('soundToggle'),
};

// ──────────── INSTANCES ────────────
const renderer = new GameRenderer(DOM.canvas);
const sound = new SoundEngine();

// ──────────── UI UPDATES ────────────
function updateBalance() {
  DOM.balance.textContent = State.balance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function updateMultiplier() {
  const el = DOM.multiplier;
  el.textContent = State.currentMultiplier.toFixed(2) + '×';
  el.className = 'multiplier-value';
  
  if (State.phase === 'crashed') {
    el.classList.add('crashed');
    DOM.multiplierOverlay.classList.add('centered');
    DOM.multiplierLabel.textContent = 'CRASHED';
  } else if (State.phase === 'cashed_out') {
    el.classList.add('cashed-out');
    DOM.multiplierOverlay.classList.add('centered');
    DOM.multiplierLabel.textContent = 'CASHED OUT';
  } else if (State.phase === 'flying') {
    DOM.multiplierOverlay.classList.remove('centered');
    DOM.multiplierLabel.textContent = '';
    const m = State.currentMultiplier;
    if (m >= 25) el.classList.add('tier-purple');
    else if (m >= 10) el.classList.add('tier-red');
    else if (m >= 5) el.classList.add('tier-orange');
    else if (m >= 2) el.classList.add('tier-yellow');
    else el.classList.add('tier-green');
  }
}

function updateActionButton() {
  const btn = DOM.actionBtn;
  const sub = DOM.actionSub;
  const modeCfg = CONFIG.MODES[State.mode];
  const totalCost = State.betAmount * modeCfg.multiplier;

  if (State.phase === 'idle' || State.phase === 'crashed' || State.phase === 'cashed_out') {
    btn.className = 'action-btn bet';
    btn.textContent = 'BET';
    sub.textContent = `$${totalCost.toFixed(2)}`;
    btn.appendChild(sub);
    if (totalCost > State.balance) {
      btn.classList.add('disabled');
    }
  } else if (State.phase === 'countdown') {
    btn.className = 'action-btn disabled';
    btn.textContent = 'STARTING...';
    sub.textContent = '';
    btn.appendChild(sub);
  } else if (State.phase === 'flying') {
    btn.className = 'action-btn cashout';
    const potentialWin = State.betAmount * State.currentMultiplier + State.bonusWinnings;
    btn.textContent = 'CASH OUT';
    sub.textContent = `$${potentialWin.toFixed(2)}`;
    btn.appendChild(sub);
  }
}

function updateStats() {
  const modeCfg = CONFIG.MODES[State.mode];
  const totalCost = State.betAmount * modeCfg.multiplier;
  DOM.statMode.textContent = modeCfg.label;
  DOM.statCost.textContent = '$' + totalCost.toLocaleString();
  DOM.statWinCap.textContent = '$' + modeCfg.winCap.toLocaleString();
  DOM.statRounds.textContent = State.roundsPlayed;
  DOM.statPL.textContent = (State.sessionPL >= 0 ? '+$' : '-$') + Math.abs(State.sessionPL).toFixed(2);
  DOM.statPL.style.color = State.sessionPL >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
}

function showEventBanner(type, text) {
  const banner = DOM.eventBanner;
  banner.className = `event-banner ${type} visible`;
  banner.textContent = text;
  setTimeout(() => banner.classList.remove('visible'), 2500);
}

function addHistory(crashPoint, eventType, cashedOut) {
  const badge = document.createElement('div');
  badge.className = 'history-badge';
  
  if (cashedOut) {
    badge.classList.add('green');
    badge.textContent = crashPoint.toFixed(2) + '×';
  } else if (eventType === 'golden_rocket') {
    badge.classList.add('gold');
    badge.textContent = crashPoint.toFixed(2) + '×';
  } else {
    badge.classList.add('red');
    badge.textContent = crashPoint.toFixed(2) + '×';
  }

  DOM.historyBar.insertBefore(badge, DOM.historyBar.firstChild);
  
  // Keep max 15
  while (DOM.historyBar.children.length > 15) {
    DOM.historyBar.removeChild(DOM.historyBar.lastChild);
  }
}

function showWinPopup(amount) {
  DOM.winAmount.textContent = '+$' + amount.toFixed(2);
  DOM.winPopup.classList.add('visible');
  setTimeout(() => DOM.winPopup.classList.remove('visible'), 2000);
}

// ──────────── SOUND TOGGLE (#3) ────────────
function toggleSound() {
  sound.enabled = !sound.enabled;
  DOM.soundToggle.textContent = sound.enabled ? '🔊' : '🔇';
  DOM.soundToggle.classList.toggle('muted', !sound.enabled);
}

// ──────────── ROUND RESULT (#4) ────────────
function showRoundResult(won, amount, multiplier) {
  const el = DOM.roundResult;
  if (won) {
    el.textContent = `Cashed out at ${multiplier.toFixed(2)}× — +$${amount.toFixed(2)}`;
    el.className = 'round-result win visible';
  } else {
    el.textContent = `Crashed at ${multiplier.toFixed(2)}× — Lost $${amount.toFixed(2)}`;
    el.className = 'round-result loss visible';
  }
  // Auto-hide after 4s
  setTimeout(() => { el.classList.remove('visible'); }, 4000);
}

function showNextRoundTimer(seconds) {
  if (!State.autoBet) return;
  const el = DOM.nextRoundTimer;
  el.className = 'next-round-timer visible';
  let remaining = seconds;
  el.textContent = `Next round in ${remaining}s...`;
  const interval = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(interval);
      el.className = 'next-round-timer';
    } else {
      el.textContent = `Next round in ${remaining}s...`;
    }
  }, 1000);
}

// ──────────── BET CONTROLS ────────────
function setBetMultiple(mult) {
  State.betAmount = Math.max(1, Math.round(State.betAmount * mult));
  DOM.betInput.value = State.betAmount;
  updatePresetHighlight();
  updateActionButton();
  updateStats();
}

function setBetMax() {
  const modeCfg = CONFIG.MODES[State.mode];
  State.betAmount = Math.floor(State.balance / modeCfg.multiplier);
  DOM.betInput.value = State.betAmount;
  updatePresetHighlight();
  updateActionButton();
  updateStats();
}

function setBetAmount(amount) {
  State.betAmount = amount;
  DOM.betInput.value = amount;
  updatePresetHighlight();
  updateActionButton();
  updateStats();
}

function updatePresetHighlight() {
  document.querySelectorAll('.bet-preset').forEach(btn => {
    const val = parseInt(btn.textContent.replace('$', ''));
    btn.classList.toggle('active', val === State.betAmount);
  });
}

function toggleAutoBet() {
  State.autoBet = !State.autoBet;
  document.getElementById('autoBetToggle').classList.toggle('active', State.autoBet);
}

function setBetPreset(amount) {
  State.betAmount = amount;
  DOM.betInput.value = amount;
  updateActionButton();
  updateStats();
}

function toggleTurbo() {
  State.turbo = !State.turbo;
  document.getElementById('turboToggle').classList.toggle('active', State.turbo);
}

// Bet input listener
DOM.betInput.addEventListener('change', () => {
  State.betAmount = Math.max(1, parseInt(DOM.betInput.value) || 1);
  DOM.betInput.value = State.betAmount;
  updatePresetHighlight();
  updateActionButton();
  updateStats();
});

// Auto cashout listener
DOM.autoCashout.addEventListener('change', () => {
  const val = parseFloat(DOM.autoCashout.value);
  State.autoCashout = (val && val >= 1.01) ? val : null;
  if (!State.autoCashout) DOM.autoCashout.value = '';
});

// Mode tabs
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (State.phase === 'flying' || State.phase === 'countdown') return;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    State.mode = tab.dataset.mode;
    updateActionButton();
    updateStats();
  });
});

// ──────────── GAME LOGIC ────────────
function handleAction() {
  sound.init();
  if (State.phase === 'countdown') return;
  
  if (State.phase === 'flying') {
    cashOut();
  } else if (State.phase === 'idle' || State.phase === 'crashed' || State.phase === 'cashed_out') {
    startRound();
  }
}

function startRound() {
  const modeCfg = CONFIG.MODES[State.mode];
  const totalCost = State.betAmount * modeCfg.multiplier;
  
  if (totalCost > State.balance) return;

  // Debit
  State.balance -= totalCost;
  updateBalance();
  sound.play('bet');

  // Generate round
  State.currentRound = MathEngine.generateRound();
  State.currentTick = 0;
  State.currentMultiplier = 1.00;
  State.cashedOutAt = null;
  State.triggeredEvents = new Set();
  State.activeEvent = null;
  State.bonusWinnings = 0;
  State.debrisPenalty = 1.0;
  State.phase = 'countdown';

  // Reset renderer
  renderer.graphPoints = [];
  renderer.eventMarkers = [];
  renderer.obstacles = [];
  renderer.collectibles = [];
  renderer.isGolden = false;
  renderer._prevAngle = undefined;

  // Hide previous round result
  DOM.roundResult.className = 'round-result';
  DOM.nextRoundTimer.className = 'next-round-timer';

  updateMultiplier();
  updateActionButton();
  DOM.statEvents.textContent = '—';

  // Countdown
  let countdown = State.turbo ? 1 : CONFIG.COUNTDOWN_SEC;
  DOM.multiplier.textContent = countdown + '...';
  DOM.multiplierLabel.textContent = 'LAUNCHING IN';
  DOM.multiplierOverlay.classList.add('centered');

  State.countdownTimer = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      clearInterval(State.countdownTimer);
      launchFlight();
    } else {
      DOM.multiplier.textContent = countdown + '...';
    }
  }, 1000);
}

function launchFlight() {
  State.phase = 'flying';
  DOM.multiplierLabel.textContent = '';
  DOM.multiplierOverlay.classList.remove('centered');
  updateActionButton();
  sound.play('launch');

  // Start ticking
  State.tickInterval = setInterval(gameTick, CONFIG.TICK_MS);
}

function gameTick() {
  if (State.phase !== 'flying') return;
  
  State.currentTick++;
  State.currentMultiplier = MathEngine.tickToMultiplier(State.currentTick);
  window._currentMult = State.currentMultiplier;
  
  // Graph data
  renderer.graphPoints.push({ mult: State.currentMultiplier });

  // Engine exhaust particles from rocket tail
  if (State.currentTick % 2 === 0) {
    renderer.addTrailParticle(renderer.rocketX, renderer.rocketY);
    renderer.addTrailParticle(renderer.rocketX, renderer.rocketY);
  }

  // Check events
  checkEvents();

  // Auto cashout
  if (State.autoCashout && State.currentMultiplier >= State.autoCashout) {
    cashOut();
    return;
  }

  // Check crash
  if (State.currentTick >= State.currentRound.crashTick) {
    crash();
    return;
  }

  updateMultiplier();
  updateActionButton();

  // Tick sound at milestones — pitch scales with multiplier (#5)
  if (Math.floor(State.currentMultiplier * 10) !== Math.floor(MathEngine.tickToMultiplier(State.currentTick - 1) * 10)) {
    const pitchMult = 1 + Math.min(State.currentMultiplier * 0.05, 1.5);
    sound.play('tick', { pitch: pitchMult });
  }
}

function checkEvents() {
  if (!State.currentRound) return;
  
  State.currentRound.events.forEach((evt, idx) => {
    if (State.triggeredEvents.has(idx)) return;
    if (evt.tick > State.currentTick) return;
    if (evt.type === 'flight_start' || evt.type === 'crash') return;

    State.triggeredEvents.add(idx);

    switch (evt.type) {
      case 'mini_boss':
        showEventBanner('mini-boss', `⚔️ MINI-BOSS! ×${evt.bonusMult} BONUS`);
        sound.play('miniboss');
        State.bonusWinnings += State.betAmount * evt.bonusMult;
        DOM.statEvents.textContent = 'Mini-Boss';
        renderer.eventMarkers.push({ tick: State.currentTick, type: 'mini_boss', label: '⚔️' });
        renderer.obstacles.push({
          type: 'boss', x: renderer.rocketX + (Math.random() > 0.5 ? 80 : -80),
          y: renderer.rocketY, size: 25, alpha: 1, isRage: false, points: 6
        });
        renderer.shake(4);
        break;

      case 'debris':
        showEventBanner('debris', `☄️ DEBRIS! −${((1-evt.penalty)*100).toFixed(0)}% PENALTY`);
        sound.play('debris');
        State.debrisPenalty *= evt.penalty;
        DOM.statEvents.textContent = `Debris (${(State.debrisPenalty * 100).toFixed(0)}%)`;
        renderer.eventMarkers.push({ tick: State.currentTick, type: 'debris', label: '☄️' });
        // Spawn visual debris
        for (let i = 0; i < 3; i++) {
          renderer.obstacles.push({
            type: 'debris', x: renderer.rocketX + (Math.random()-0.5) * 200,
            y: renderer.rocketY - 50 - Math.random() * 100,
            size: 10 + Math.random() * 15, alpha: 1, points: 5 + Math.floor(Math.random()*4)
          });
        }
        renderer.shake(6);
        break;

      case 'boss_rage':
        showEventBanner('boss-rage', `🔥 BOSS RAGE! ×${evt.bonusMult} BONUS`);
        sound.play('miniboss');
        State.bonusWinnings += State.betAmount * evt.bonusMult;
        DOM.statEvents.textContent = 'Boss Rage';
        renderer.eventMarkers.push({ tick: State.currentTick, type: 'boss_rage', label: '🔥' });
        renderer.obstacles.push({
          type: 'boss', x: renderer.rocketX, y: renderer.rocketY - 80,
          size: 35, alpha: 1, isRage: true, points: 8
        });
        renderer.shake(8);
        renderer.addExplosion(renderer.rocketX, renderer.rocketY - 80, 'rgba(239,68,68,1)', 20);
        break;

      case 'golden_rocket':
        showEventBanner('golden-rocket', `🚀 GOLDEN ROCKET! ×${evt.bonusMult} BONUS`);
        sound.play('golden');
        State.bonusWinnings += State.betAmount * evt.bonusMult;
        DOM.statEvents.textContent = 'Golden Rocket';
        renderer.eventMarkers.push({ tick: State.currentTick, type: 'golden_rocket', label: '🚀' });
        renderer.isGolden = true;
        // Spawn collectible coins
        for (let i = 0; i < 4; i++) {
          renderer.collectibles.push({
            x: renderer.rocketX + (Math.random()-0.5) * 160,
            y: renderer.rocketY - 30 - Math.random() * 80,
            size: 12, alpha: 1, phase: Math.random() * Math.PI * 2
          });
        }
        renderer.addExplosion(renderer.rocketX, renderer.rocketY, 'rgba(255,215,0,1)', 25);
        break;
    }
  });

  // Fade obstacles/collectibles
  renderer.obstacles.forEach(o => { o.alpha = Math.max(0, o.alpha - 0.005); });
  renderer.collectibles.forEach(c => { c.alpha = Math.max(0, c.alpha - 0.008); });
}

function cashOut() {
  if (State.phase !== 'flying') return;
  
  clearInterval(State.tickInterval);
  State.cashedOutAt = State.currentMultiplier;
  State.phase = 'cashed_out';
  window._currentMult = 1;
  
  const modeCfg = CONFIG.MODES[State.mode];
  let winAmount = (State.betAmount * State.currentMultiplier * State.debrisPenalty) + State.bonusWinnings;
  winAmount = Math.min(winAmount, modeCfg.winCap);
  
  State.balance += winAmount;
  State.sessionPL += winAmount - State.betAmount * modeCfg.multiplier;
  State.roundsPlayed++;
  
  updateBalance();
  updateMultiplier();
  updateActionButton();
  updateStats();
  
  sound.play('cashout');
  sound.play('win');
  
  showWinPopup(winAmount);
  addHistory(State.currentMultiplier, State.currentRound.eventType, true);
  renderer.addExplosion(renderer.rocketX, renderer.rocketY, 'rgba(0,231,1,1)', 40);

  // Auto-bet after delay
  if (State.autoBet) {
    const nextCost = State.betAmount * modeCfg.multiplier;
    if (nextCost > State.balance) {
      State.autoBet = false;
      document.getElementById('autoBetToggle').classList.remove('active');
    } else {
      showNextRoundTimer(2);
      setTimeout(() => {
        if (State.autoBet && (State.phase === 'cashed_out')) startRound();
      }, 2000);
    }
  }
}

function crash() {
  clearInterval(State.tickInterval);
  State.currentMultiplier = State.currentRound.crashPoint;
  State.phase = 'crashed';
  window._currentMult = 1;
  
  const modeCfg = CONFIG.MODES[State.mode];
  State.sessionPL -= State.betAmount * modeCfg.multiplier;
  State.roundsPlayed++;
  
  updateMultiplier();
  updateActionButton();
  updateStats();
  
  sound.play('crash');
  
  const totalBet = State.betAmount * modeCfg.multiplier;
  showRoundResult(false, totalBet, State.currentRound.crashPoint);
  addHistory(State.currentRound.crashPoint, State.currentRound.eventType, false);
  renderer.addExplosion(renderer.rocketX, renderer.rocketY, 'rgba(255,59,92,1)', 50);
  renderer.shake(10);

  // Auto-bet after delay
  if (State.autoBet) {
    const nextCost = State.betAmount * modeCfg.multiplier;
    if (nextCost > State.balance) {
      State.autoBet = false;
      document.getElementById('autoBetToggle').classList.remove('active');
    } else {
      showNextRoundTimer(3);
      setTimeout(() => {
        if (State.autoBet && State.phase === 'crashed') startRound();
      }, 2500);
    }
  }
}

// ──────────── RENDER LOOP ────────────
function renderLoop() {
  renderer.render(State.phase === 'flying' ? 'flying' :
                  State.phase === 'crashed' ? 'crashed' :
                  State.phase === 'cashed_out' ? 'cashed_out' : 'idle');
  requestAnimationFrame(renderLoop);
}

// ──────────── KEYBOARD ────────────
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    handleAction();
  }
});

// ──────────── INIT ────────────
updateBalance();
updateStats();
updateActionButton();
renderLoop();

// Waiting state display
function updateIdleDisplay() {
  if (State.phase === 'idle') {
    DOM.multiplier.innerHTML = 'PLACE BET';
    DOM.multiplierLabel.textContent = 'PRESS SPACE OR CLICK BET';
    DOM.multiplierOverlay.classList.add('centered');
  }
}
updateIdleDisplay();
</script>
</body>
</html>
